name: Build Qt 6.5.3 Static Library (MSVC 2022, No QML/Network) on windows-2022

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-qt-static:
    runs-on: windows-2022

    steps:
      - name: Checkout repository (dummy step)
        run: echo "No need to checkout, will download Qt source directly"

      - name: Install Perl (Strawberry Perl)
        run: choco install strawberryperl --no-progress
        shell: powershell

      #- name: Install jom (Qt parallel build tool)
      #  run: choco install jom --source="https://community.chocolatey.org/api/v2/" --force
      #  shell: powershell
      - name: Install jom (robust manual download)
        run: |
          # 1. 创建基础目录
          $installDir = "C:\tools\jom"
          mkdir -Force $installDir
          
          # 2. 下载 jom.zip（带重试）
          $zipPath = "$installDir\jom.zip"
          $url = "https://ftp.funet.fi/pub/mirrors/download.qt-project.org/official_releases/jom/jom.zip"
          $maxRetries = 3
          for ($i = 1; $i -le $maxRetries; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing -ErrorAction Stop
              Write-Host "✓ Downloaded jom.zip (attempt $i)"
              break
            } catch {
              if ($i -eq $maxRetries) { throw "Download failed after $maxRetries attempts: $_" }
              Write-Host "⚠ Attempt $i failed, retrying in $($i*2)s..."
              Start-Sleep -Seconds ($i * 2)
            }
          }
          
          # 3. 解压
          Expand-Archive -Path $zipPath -DestinationPath $installDir -Force
          
          # 4. 🔑 关键：自动查找 jom.exe 所在目录
          $jomExe = Get-ChildItem -Path $installDir -Recurse -Filter "jom.exe" -File | Select-Object -First 1
          if (-not $jomExe) {
            throw "jom.exe not found in $installDir. Contents: $(Get-ChildItem $installDir -Recurse | Format-Table | Out-String)"
          }
          $jomBinDir = $jomExe.Directory.FullName
          Write-Host "✓ Found jom.exe at: $jomBinDir"
          
          # 5. 将正确目录添加到 PATH（GitHub Actions 专用）
          echo "$jomBinDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "✓ Added $jomBinDir to PATH"
          
          # 6. 当前会话立即生效（可选，用于本 step 内验证）
          $env:PATH = "$jomBinDir;$env:PATH"
          
          # 7. 验证
          Write-Host "=== jom version ==="
          jom --version
        shell: pwsh
        id: install-jom  # 添加 ID 便于引用

      - name: Setup MSVC 2022 x64 development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: '2022'  

      - name: Download Qt 6.5.3 source code
        run: |
          curl -L -o qt-everywhere-src-6.5.3.zip ^
            https://download.qt.io/archive/qt/6.5/6.5.3/single/qt-everywhere-src-6.5.3.zip    
        shell: cmd

      - name: Extract source code
        run: |
          7z x qt-everywhere-src-6.5.3.zip -oqt-src -y
        shell: cmd

      - name: Find Qt source directory and set environment variable
        run: |
          $extractedDir = Get-ChildItem -Path "qt-src" -Directory | Where-Object { Test-Path "$($_.FullName)\configure.bat" } | Select-Object -First 1
          if ($extractedDir) {
            $qtSourceDir = $extractedDir.FullName
            echo "QT_SOURCE_DIR=$qtSourceDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "Found configure.bat in $qtSourceDir"
          } else {
            Write-Error "configure.bat not found in qt-src subdirectories"
            exit 1
          }
        shell: pwsh

      - name: Configure Qt build
        working-directory: ${{ env.QT_SOURCE_DIR }}
        run: |
          call configure.bat ^
            -static ^
            -static-runtime ^
            -release ^
            -platform win32-msvc2022 ^
            -prefix %CD%\qt-install ^
            -no-opengl ^
            -skip qt3d ^
        shell: cmd

      - name: Build and install Qt
        working-directory: ${{ env.QT_SOURCE_DIR }}
        run: |
          jom -j %NUMBER_OF_PROCESSORS%
          jom install
        shell: cmd

      - name: Upload artifacts (headers, libs, tools)
        uses: actions/upload-artifact@v4
        with:
          name: qt-6.5.3-static-msvc2022-x64  
          path: ${{ env.QT_SOURCE_DIR }}\qt-install

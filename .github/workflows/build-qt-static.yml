name: Build Qt 5.12 Static Library (MSVC 2019, No QML/Network)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-qt-static:
    runs-on: windows-2019

    steps:
      - name: Checkout repository (dummy step)
        run: echo "No need to checkout, will download Qt source directly"

      - name: Install Perl (Strawberry Perl)
        run: choco install strawberryperl --no-progress
        shell: powershell

      - name: Install jom (Qt parallel build tool)
        run: choco install jom --no-progress
        shell: powershell

      - name: Setup MSVC 2019 x64 development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download Qt 5.12.12 source code
        run: |
          curl -L -o qt-everywhere-src-5.12.12.zip ^
            https://download.qt.io/official_releases/qt/5.12/5.12.12/single/qt-everywhere-src-5.12.12.zip
        shell: cmd

      - name: Extract source code
        run: |
          7z x qt-everywhere-src-5.12.12.zip -oqt-src -y
        shell: cmd

      - name: Configure Qt build
        working-directory: qt-src
        run: |
          call configure.bat ^
            -static ^
            -static-runtime ^
            -release ^
            -platform win32-msvc2019 ^
            -target x64 ^
            -prefix %CD%\qt-install ^
            -no-qml ^
            -no-network ^
            -no-opengl ^
            -no-sql-ibase -no-sql-mysql -no-sql-odbc -no-sql-psql -no-sql-sqlite -no-sql-tds ^
            -skip qt3d ^
            -skip qtactiveqt ^
            -skip qtandroidextras ^
            -skip qtcanvas3d ^
            -skip qtcharts ^
            -skip qtconnectivity ^
            -skip qtdatavis3d ^
            -skip qtdeclarative ^
            -skip qtdoc ^
            -skip qtgamepad ^
            -skip qtgraphicaleffects ^
            -skip qtlocation ^
            -skip qtmacextras ^
            -skip qtmultimedia ^
            -skip qtnetworkauth ^
            -skip qtpurchasing ^
            -skip qtquickcontrols ^
            -skip qtquickcontrols2 ^
            -skip qtremoteobjects ^
            -skip qtscript ^
            -skip qtscxml ^
            -skip qtsensors ^
            -skip qtserialbus ^
            -skip qtserialport ^
            -skip qtspeech ^
            -skip qttranslations ^
            -skip qtvirtualkeyboard ^
            -skip qtwayland ^
            -skip qtwebchannel ^
            -skip qtwebengine ^
            -skip qtwebview ^
            -skip qtx11extras ^
            -skip qtxmlpatterns ^
            -skip qtimageformats ^
            -skip qtsvg ^
            -skip qttools        # if qmake/moc etc. are not needed, keep this; remove if needed
        shell: cmd

      - name: Build and install Qt
        working-directory: qt-src
        run: |
          jom -j %NUMBER_OF_PROCESSORS%
          jom install
        shell: cmd

      - name: Upload artifacts (headers, libs, tools)
        uses: actions/upload-artifact@v3
        with:
          name: qt-5.12.12-static-msvc2019-x64
          path: qt-src/qt-install

# .github/workflows/build-qt-static.yml
name: Build Qt 5 Static (MSVC 2019)

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-qt-static.yml'

env:
  QT_VERSION: "5.15.18"
  QT_SRC_URL: "https://download.qt.io/archive/qt/5.15/5.15.18/single/qt-everywhere-src-5.15.18.zip"
  QT_INSTALL_PREFIX: "C:/Qt/5.15.18_static/msvc2019_64"
  SRC_DIR: "C:/qt-src"

jobs:
  build-qt-static:
    name: Build Qt Static
    runs-on: windows-2022
    timeout-minutes: 720
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSVC 2019 Toolset (on VS2022 image)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64
        toolset: 14.2

    - name: Install prerequisites
      shell: cmd
      run: |
        choco install strawberryperl -y --no-progress
        choco install 7zip -y --no-progress
        refreshenv

    - name: Create directories
      shell: cmd
      run: |
        mkdir "%SRC_DIR%"
        mkdir "%QT_INSTALL_PREFIX%"

    - name: Download Qt Source
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri $env:QT_SRC_URL -OutFile "$env:SRC_DIR\qt-src.zip" -UseBasicParsing

    - name: Extract Qt Source
      shell: cmd
      run: |
        cd /d "%SRC_DIR%"
        "C:\Program Files\7-Zip\7z.exe" x qt-src.zip -o"%SRC_DIR%" -y

    - name: Configure Qt (Static Build)
      shell: cmd
      working-directory: ${{ env.SRC_DIR }}/qt-everywhere-src-${{ env.QT_VERSION }}
      run: |
        echo "=== Qt Configure ==="
        configure.bat ^
          -prefix "%QT_INSTALL_PREFIX%" ^
          -platform win32-msvc2019 ^
          -static ^
          -static-runtime ^
          -release ^
          -opensource ^
          -confirm-license ^
          -nomake examples ^
          -nomake tests ^
          -mp ^
          -no-openssl ^
          -sql-sqlite ^
          -qt-sqlite ^
          -qt-zlib ^
          -qt-libpng ^
          -qt-libjpeg ^
          -skip qtwebengine ^
          -skip qt3d ^
          -skip qtsensors ^
          -skip qtlocation ^
          -skip qtdoc ^
          -skip qtwayland ^
          -skip qtwebglplugin ^
          -skip qtactiveqt ^
          -skip qtlottie ^
          -skip qtremoteobjects ^
          -skip qtnetworkauth ^
          -skip qtspeech

    - name: Build Qt
      shell: cmd
      working-directory: ${{ env.SRC_DIR }}/qt-everywhere-src-${{ env.QT_VERSION }}
      run: |
        echo "=== Starting nmake (3-6 hours) ==="
        nmake
        if %errorlevel% neq 0 exit /b %errorlevel%

    - name: Install Qt
      shell: cmd
      working-directory: ${{ env.SRC_DIR }}/qt-everywhere-src-${{ env.QT_VERSION }}
      run: |
        nmake install

    - name: Verify Installation
      shell: pwsh 
      run: |
        Write-Host "=== Verifying Qt Installation ==="
        
        # 检查 qmake
        & "$env:QT_INSTALL_PREFIX/bin/qmake.exe" -v
        if ($LASTEXITCODE -ne 0) { 
          Write-Host "❌ qmake verification failed"
          exit 1 
        }

    - name: Package Build
      shell: pwsh
      run: |
        $zip = "qt-$env:QT_VERSION-static-msvc2019_64.zip"
        & "C:\Program Files\7-Zip\7z.exe" a -tzip -mx=9 $zip "$env:QT_INSTALL_PREFIX/*"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: qt-static-build
        path: qt-*.zip
        retention-days: 7

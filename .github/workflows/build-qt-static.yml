name: Build Qt 5.12 Static Library (MSVC 2019, No QML/Network) on windows-2022

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-qt-static:
    runs-on: windows-2022   # 使用 windows-2022 镜像

    steps:
      - name: Checkout repository (dummy step)
        run: echo "No need to checkout, will download Qt source directly"

      - name: Install Perl (Strawberry Perl)
        run: choco install strawberryperl --no-progress
        shell: powershell

      - name: Install jom (Qt parallel build tool)
        run: choco install jom --no-progress
        shell: powershell

      - name: Install Visual Studio 2019 Build Tools
        run: |
          choco install visualstudio2019buildtools --package-parameters "--add Microsoft.VisualStudio.Component.VC.Tools.x86.x64" --no-progress
        shell: powershell

      - name: Setup MSVC 2019 x64 development environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
          vsversion: '2019'   # 强制使用 Visual Studio 2019 工具链

      - name: Download Qt 5.12.12 source code
        run: |
          curl -L -o qt-everywhere-src-5.12.12.zip ^
            https://download.qt.io/archive/qt/5.12/5.12.12/single/qt-everywhere-src-5.12.12.zip
        shell: cmd

      - name: Extract source code
        run: |
          7z x qt-everywhere-src-5.12.12.zip -oqt-src -y
        shell: cmd

      - name: Find Qt source directory and set environment variable
        run: |
          $extractedDir = Get-ChildItem -Path "qt-src" -Directory | Where-Object { Test-Path "$($_.FullName)\configure.bat" } | Select-Object -First 1
          if ($extractedDir) {
            $qtSourceDir = $extractedDir.FullName
            echo "QT_SOURCE_DIR=$qtSourceDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            echo "Found configure.bat in $qtSourceDir"
          } else {
            Write-Error "configure.bat not found in qt-src subdirectories"
            exit 1
          }
        shell: pwsh

      - name: Configure Qt build
        working-directory: ${{ env.QT_SOURCE_DIR }}
        run: |
          call configure.bat ^
            -static ^
            -static-runtime ^
            -release ^
            -platform win32-msvc2019 ^
            -prefix %CD%\qt-install ^
            -no-qml ^
            -no-network ^
            -no-opengl ^
            -skip qt3d ^
            -skip qtactiveqt ^
            -skip qtandroidextras ^
            -skip qtcanvas3d ^
            -skip qtcharts ^
            -skip qtconnectivity ^
            -skip qtdatavis3d ^
            -skip qtdeclarative ^
            -skip qtgamepad ^
            -skip qtgraphicaleffects ^
            -skip qtlocation ^
            -skip qtmacextras ^
            -skip qtmultimedia ^
            -skip qtnetworkauth ^
            -skip qtpurchasing ^
            -skip qtquickcontrols ^
            -skip qtquickcontrols2 ^
            -skip qtremoteobjects ^
            -skip qtsensors ^
            -skip qtserialbus ^
            -skip qtserialport ^
            -skip qtspeech ^
            -skip qttranslations ^
            -skip qtwayland ^
            -skip qtwebchannel ^
            -skip qtwebengine ^
            -skip qtwebview ^
            -skip qtx11extras ^
        shell: cmd

      - name: Build and install Qt
        working-directory: ${{ env.QT_SOURCE_DIR }}
        run: |
          jom -j %NUMBER_OF_PROCESSORS%
          jom install
        shell: cmd

      - name: Upload artifacts (headers, libs, tools)
        uses: actions/upload-artifact@v4
        with:
          name: qt-5.12.12-static-msvc2019-x64
          path: ${{ env.QT_SOURCE_DIR }}\qt-install
